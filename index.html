<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flâneur</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#e8e6e1}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}

.header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a3a;flex-shrink:0;z-index:1000;position:relative}
.header-editor{background:#13131a}
.header-player{background:#221240}
.logo{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%}
.dot-e{background:#e8572a;box-shadow:0 0 10px rgba(232,87,42,.3)}
.dot-p{background:#c77dff;box-shadow:0 0 10px rgba(199,125,255,.3)}
.htitle{font-size:15px;font-weight:700;letter-spacing:-.02em}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.badge-e{color:#5a5868;background:rgba(232,87,42,.12)}
.badge-p{color:#c77dff;background:rgba(199,125,255,.12)}
.sw-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;background:transparent;border:1px solid #2a2a3a;color:#e8e6e1;font-size:12px;font-weight:500;transition:all .2s}
.sw-btn:active{border-color:#e8572a;color:#e8572a}

.view{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.view-e{background:#0a0a0f}
.view-p{background:#1a0a2e}
.map-wrap{flex:1;position:relative;min-height:0}
.map-wrap .leaflet-container{width:100%;height:100%;background:#0a0a0f}

/* ── Map controls ── */
.map-controls{position:absolute;top:12px;right:12px;z-index:800;display:flex;flex-direction:column;gap:6px}
.map-ctrl-btn{width:40px;height:40px;border-radius:10px;background:rgba(19,19,26,.92);border:1px solid #2a2a3a;backdrop-filter:blur(10px);color:#e8e6e1;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:16px}
.map-ctrl-btn:active{border-color:#e8572a;background:rgba(232,87,42,.15)}
.map-ctrl-btn.active-style{border-color:#e8572a;color:#e8572a}

.style-menu{position:absolute;top:12px;right:58px;z-index:800;background:rgba(19,19,26,.96);border:1px solid #2a2a3a;border-radius:12px;backdrop-filter:blur(20px);padding:6px;display:none;min-width:150px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.style-menu.show{display:block}
.style-opt{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;border-radius:8px;background:transparent;color:#e8e6e1;font-size:13px;text-align:left;transition:background .15s}
.style-opt:active{background:rgba(232,87,42,.12)}
.style-opt .swatch{width:20px;height:20px;border-radius:6px;border:1px solid #3a3a4a;flex-shrink:0}
.style-opt.on{color:#e8572a;font-weight:600}
.style-opt.on .swatch{border-color:#e8572a}

/* ── Points count ── */
.pts-count{position:absolute;top:12px;left:12px;z-index:800;padding:7px 14px;border-radius:10px;background:rgba(19,19,26,.92);border:1px solid #2a2a3a;backdrop-filter:blur(10px);font-size:12px;color:#8a8894}
.pts-count b{color:#e8572a;font-size:15px;font-weight:700}

/* ── Add btn ── */
.add-btn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:800;display:flex;align-items:center;gap:8px;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:all .25s}
.add-btn.idle{background:#13131a;color:#e8e6e1;border:1px solid #2a2a3a}
.add-btn.on{background:#e8572a;color:#fff;border:1px solid #e8572a}

/* ── Chips ── */
.chips{position:absolute;bottom:72px;left:12px;right:12px;z-index:800;display:flex;gap:6px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 14px;border-radius:10px;background:rgba(19,19,26,.92);border:1px solid #2a2a3a;color:#e8e6e1;display:flex;align-items:center;gap:7px;font-size:12px;backdrop-filter:blur(10px)}
.chip:active{border-color:#e8572a}
.chip .n{width:20px;height:20px;border-radius:50%;background:#e8572a;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.chip .au{color:#3ecf8e;font-size:9px}

/* ── Panel ── */
.panel{position:absolute;top:0;right:0;bottom:0;width:min(380px,90vw);background:rgba(19,19,26,.97);border-left:1px solid #2a2a3a;backdrop-filter:blur(20px);z-index:900;display:flex;flex-direction:column;overflow:hidden;animation:sIn .25s ease}
@keyframes sIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.p-head{padding:14px 16px;border-bottom:1px solid #2a2a3a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.p-head span{font-size:14px;font-weight:600}
.p-acts{display:flex;gap:6px}
.bdel{padding:5px 9px;border-radius:6px;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.2);color:#ff5050;font-size:11px}
.bclo{padding:5px 10px;border-radius:6px;background:rgba(232,87,42,.1);border:1px solid rgba(232,87,42,.25);color:#e8572a;font-size:11px;font-weight:600}
.p-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.fl{font-size:11px;font-weight:600;color:#8a8894;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block}
.fl .v{color:#e8572a}
.fi{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #2a2a3a;background:#0a0a0f;color:#e8e6e1;font-size:13px;outline:none;margin-bottom:14px;transition:border-color .2s}
.fi:focus{border-color:#e8572a}
.fi.sm{width:80px}
textarea.fi{resize:vertical}
input[type=range]{width:100%;margin-bottom:14px;accent-color:#e8572a}

.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:4px 12px;border-radius:18px;border:1px solid #2a2a3a;background:transparent;color:#8a8894;font-size:11px;transition:all .2s}
.pill.on{border-color:#e8572a;background:rgba(232,87,42,.12);color:#e8572a;font-weight:600}

.tg-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;cursor:pointer}
.tg{width:38px;height:20px;border-radius:10px;position:relative;transition:background .2s}
.tg.off{background:#2a2a3a}
.tg.on{background:#e8572a}
.tg .k{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s}
.tg.off .k{left:3px}
.tg.on .k{left:21px}

.crd{padding:10px;border-radius:8px;background:#0a0a0f;border:1px solid #2a2a3a;font-size:11px;color:#5a5868;margin-top:4px}

/* ── Player ── */
.notif{position:absolute;top:16px;left:16px;right:16px;z-index:900;padding:14px 18px;border-radius:12px;background:rgba(34,18,64,.94);backdrop-filter:blur(20px);border:1px solid rgba(199,125,255,.25);box-shadow:0 8px 32px rgba(0,0,0,.4);animation:fIn .3s ease}
@keyframes fIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.notif p{font-size:13px;line-height:1.5}

.np{position:absolute;bottom:130px;left:16px;right:16px;z-index:900;padding:14px 18px;border-radius:14px;background:linear-gradient(135deg,rgba(34,18,64,.94),rgba(26,10,46,.94));backdrop-filter:blur(20px);border:1px solid rgba(199,125,255,.2);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.np .inn{display:flex;align-items:center;gap:12px}
.np .ico{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#c77dff,#8b5cf6);display:flex;align-items:center;justify-content:center;animation:pul 2s infinite}
@keyframes pul{0%,100%{opacity:1}50%{opacity:.7}}
.np .lb{font-size:10px;color:#c77dff;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.np .nm{font-size:14px;font-weight:600;margin-top:3px}
.bsa{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;display:flex;align-items:center;justify-content:center}

.p-ctrl{padding:14px 16px 24px;border-top:1px solid #2a2a3a;background:#221240;flex-shrink:0}
.prg-h{display:flex;justify-content:space-between;font-size:11px;color:#8a8894;margin-bottom:5px}
.prg-b{height:4px;border-radius:4px;background:rgba(255,255,255,.08);margin-bottom:12px}
.prg-f{height:100%;border-radius:4px;background:linear-gradient(90deg,#c77dff,#8b5cf6);transition:width .5s ease}
.mbtn{width:100%;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.02em}
.mbtn.go{background:linear-gradient(135deg,#c77dff,#8b5cf6);color:#fff;box-shadow:0 4px 20px rgba(199,125,255,.3)}
.mbtn.st{background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.3);color:#ff6b6b}
.mbtn.dis{background:#2a2a3a;color:#5a5868;cursor:not-allowed}

.leaflet-control-zoom a{background:#13131a!important;color:#e8e6e1!important;border-color:#2a2a3a!important}
.leaflet-control-attribution{display:none!important}
</style>
</head>
<body>

<!-- ═══ EDITOR ═══ -->
<div id="eView" class="view view-e">
  <div class="header header-editor">
    <div class="logo"><div class="dot dot-e"></div><span class="htitle">Flâneur</span></div>
    <button class="sw-btn" onclick="toPlayer()">🎧 Player</button>
  </div>
  <div class="map-wrap">
    <div id="eMap" style="width:100%;height:100%"></div>
    <div class="pts-count"><b id="ptCt">0</b> punto<span id="ptPl">s</span></div>

    <!-- Map controls -->
    <div class="map-controls">
      <button class="map-ctrl-btn" onclick="centerOnMe('editor')" title="Mi ubicación">📍</button>
      <button class="map-ctrl-btn" id="styleBtn" onclick="toggleStyleMenu()" title="Estilo de mapa">🗺</button>
    </div>
    <div class="style-menu" id="styleMenu">
      <button class="style-opt" onclick="setMapStyle('dark')"><span class="swatch" style="background:#1a1a2e"></span>Oscuro</button>
      <button class="style-opt" onclick="setMapStyle('light')"><span class="swatch" style="background:#e8e6e1"></span>Claro</button>
      <button class="style-opt" onclick="setMapStyle('street')"><span class="swatch" style="background:#f0ebe3"></span>Callejero</button>
      <button class="style-opt" onclick="setMapStyle('satellite')"><span class="swatch" style="background:#2a4a2a"></span>Satélite</button>
    </div>

    <button id="addBtn" class="add-btn idle" onclick="toggleClick()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span id="addTxt">Agregar punto</span>
    </button>
    <div id="chipS" class="chips"></div>

    <!-- Panel -->
    <div id="panel" class="panel" style="display:none">
      <div class="p-head">
        <span>Editar punto</span>
        <div class="p-acts">
          <button class="bdel" onclick="delPt()">🗑 Eliminar</button>
          <button class="bclo" onclick="closeP()">Cerrar</button>
        </div>
      </div>
      <div class="p-body">
        <label class="fl">Título</label>
        <input id="fT" class="fi" oninput="upd('title',this.value)">
        <label class="fl">URL del audio</label>
        <input id="fA" class="fi" placeholder="https://ejemplo.com/audio.mp3" oninput="upd('audioUrl',this.value)">
        <label class="fl">Radio de activación: <span class="v" id="fRV">30m</span></label>
        <input id="fR" type="range" min="10" max="200" step="5" value="30" oninput="upd('radius',+this.value);document.getElementById('fRV').textContent=this.value+'m'">
        <label class="fl">Orden en secuencia</label>
        <input id="fO" type="number" min="1" class="fi sm" oninput="upd('order',+this.value||1)">
        <label class="fl">Activar según momento del día</label>
        <div class="pills" id="tPills"></div>
        <div class="tg-row" onclick="tgSeq()">
          <div id="seqTg" class="tg off"><div class="k"></div></div>
          <span style="font-size:12px">Requiere punto anterior escuchado</span>
        </div>
        <label class="fl">Mensaje / subtítulo</label>
        <textarea id="fM" class="fi" rows="3" placeholder="Texto para el caminante..." oninput="upd('message',this.value)"></textarea>
        <label class="fl">Notificación al acercarse</label>
        <input id="fN" class="fi" placeholder="Ej: Mirá a tu derecha..." oninput="upd('notification',this.value)">
        <div class="crd" id="fC"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ PLAYER ═══ -->
<div id="pView" class="view view-p" style="display:none">
  <div class="header header-player">
    <div class="logo"><div class="dot dot-p"></div><span class="htitle">Flâneur</span></div>
    <button class="sw-btn" onclick="toEditor()">✏️ Editor</button>
  </div>
  <div class="map-wrap">
    <div id="pMap" style="width:100%;height:100%"></div>
    <!-- Player map controls -->
    <div class="map-controls">
      <button class="map-ctrl-btn" onclick="centerOnMe('player')" title="Mi ubicación">📍</button>
      <button class="map-ctrl-btn" onclick="toggleStyleMenuP()" title="Estilo de mapa">🗺</button>
    </div>
    <div class="style-menu" id="styleMenuP">
      <button class="style-opt" onclick="setMapStyleP('dark')"><span class="swatch" style="background:#1a1a2e"></span>Oscuro</button>
      <button class="style-opt" onclick="setMapStyleP('light')"><span class="swatch" style="background:#e8e6e1"></span>Claro</button>
      <button class="style-opt" onclick="setMapStyleP('street')"><span class="swatch" style="background:#f0ebe3"></span>Callejero</button>
      <button class="style-opt" onclick="setMapStyleP('satellite')"><span class="swatch" style="background:#2a4a2a"></span>Satélite</button>
    </div>
    <div id="nToast" class="notif" style="display:none"><p id="nTxt"></p></div>
    <div id="npCard" class="np" style="display:none">
      <div class="inn">
        <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg></div>
        <div style="flex:1"><p class="lb">Reproduciendo</p><p class="nm" id="npN"></p></div>
        <button class="bsa" onclick="stopAud()"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg></button>
      </div>
    </div>
  </div>
  <div class="p-ctrl">
    <div class="prg-h"><span id="prL">0 / 0 puntos</span><span id="prP">0%</span></div>
    <div class="prg-b"><div class="prg-f" id="prF" style="width:0"></div></div>
    <button id="mBtn" class="mbtn dis" onclick="tgTrack()">▶ Sin puntos cargados</button>
  </div>
</div>

<audio id="aud"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ═════════════════════════════════════════
//  SONICWALK v2 — location + map styles
// ═════════════════════════════════════════
const SK='sonicwalk_points';
let pts=[], eMap, pMap, eMks=[], clickOn=false, editId=null;
let tracking=false, watchId=null, uMkE=null, uMkP=null;
let done=new Set(), notified=new Set(), playing=false, activePt=null, nTimer=null;
let curStyle='light', curStyleP='light';
let eTileLayer=null, pTileLayer=null;
let userLat=null, userLng=null;

// ── Tile URLs ──
const TILES={
  dark:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  light:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  street:'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  satellite:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
};

function ld(){try{pts=JSON.parse(localStorage.getItem(SK)||'[]')}catch{pts=[]}}
function sv(){localStorage.setItem(SK,JSON.stringify(pts))}
function gid(){return Math.random().toString(36).substr(2,9)}
function hav(a,b,c,d){const R=6371000,r=x=>x*Math.PI/180,dl=r(c-a),dn=r(d-b),e=Math.sin(dl/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e))}
function tod(){const h=new Date().getHours();if(h>=5&&h<12)return'morning';if(h>=12&&h<18)return'afternoon';if(h>=18&&h<21)return'evening';return'night'}

// ── User location marker helper ──
function makeUserIcon(){
  return L.divIcon({className:'',html:'<div style="width:16px;height:16px;border-radius:50%;background:#3ecf8e;border:3px solid #fff;box-shadow:0 0 16px rgba(62,207,142,.5)"></div>',iconSize:[16,16],iconAnchor:[8,8]});
}

function startEditorLocation(){
  if(!navigator.geolocation)return;
  navigator.geolocation.watchPosition(pos=>{
    userLat=pos.coords.latitude; userLng=pos.coords.longitude;
    if(!eMap)return;
    if(uMkE){uMkE.setLatLng([userLat,userLng])}
    else{uMkE=L.marker([userLat,userLng],{icon:makeUserIcon(),zIndexOffset:1000}).addTo(eMap)}
  },()=>{},{enableHighAccuracy:true,maximumAge:3000,timeout:10000});
}

function centerOnMe(which){
  if(userLat===null){alert('Esperando ubicación GPS...');return}
  if(which==='editor'&&eMap)eMap.setView([userLat,userLng],17);
  if(which==='player'&&pMap)pMap.setView([userLat,userLng],17);
}

// ── Map style switching ──
function setMapStyle(s){
  curStyle=s;
  if(eTileLayer)eMap.removeLayer(eTileLayer);
  eTileLayer=L.tileLayer(TILES[s],{maxZoom:19}).addTo(eMap);
  updateStyleMenu('styleMenu',s);
  document.getElementById('styleMenu').classList.remove('show');
}
function setMapStyleP(s){
  curStyleP=s;
  if(pTileLayer)pMap.removeLayer(pTileLayer);
  pTileLayer=L.tileLayer(TILES[s],{maxZoom:19}).addTo(pMap);
  updateStyleMenu('styleMenuP',s);
  document.getElementById('styleMenuP').classList.remove('show');
}
function updateStyleMenu(menuId,active){
  const menu=document.getElementById(menuId);
  const btns=menu.querySelectorAll('.style-opt');
  const names=['dark','light','street','satellite'];
  btns.forEach((b,i)=>{b.classList.toggle('on',names[i]===active)});
}
function toggleStyleMenu(){document.getElementById('styleMenu').classList.toggle('show');document.getElementById('styleMenuP').classList.remove('show')}
function toggleStyleMenuP(){document.getElementById('styleMenuP').classList.toggle('show');document.getElementById('styleMenu').classList.remove('show')}

// ═══ EDITOR ═══
function initE(center){
  if(eMap)return;
  eMap=L.map('eMap',{zoomControl:false}).setView(center,16);
  L.control.zoom({position:'bottomleft'}).addTo(eMap);
  eTileLayer=L.tileLayer(TILES[curStyle],{maxZoom:19}).addTo(eMap);
  updateStyleMenu('styleMenu',curStyle);

  // Close style menu on map click
  eMap.on('click',function(e){
    document.getElementById('styleMenu').classList.remove('show');
    if(!clickOn)return;
    const pt={id:gid(),lat:e.latlng.lat,lng:e.latlng.lng,title:'Punto '+(pts.length+1),audioUrl:'',radius:30,order:pts.length+1,triggerTime:'any',triggerSequence:false,message:'',notification:''};
    pts.push(pt);sv();renderMks();openP(pt.id);toggleClick();
  });

  renderMks();
  startEditorLocation();
}

function renderMks(){
  if(!eMap)return;
  eMks.forEach(m=>eMap.removeLayer(m));eMks=[];
  pts.forEach((pt,i)=>{
    const ic=L.divIcon({className:'',html:`<div style="width:30px;height:30px;border-radius:50%;background:#e8572a;border:3px solid #0a0a0f;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;box-shadow:0 0 16px rgba(232,87,42,.3)">${pt.order||i+1}</div>`,iconSize:[30,30],iconAnchor:[15,15]});
    const mk=L.marker([pt.lat,pt.lng],{icon:ic,draggable:true}).addTo(eMap);
    mk.on('click',()=>openP(pt.id));
    mk.on('dragend',e=>{const p=pts.find(x=>x.id===pt.id);if(p){p.lat=e.target.getLatLng().lat;p.lng=e.target.getLatLng().lng;sv();renderMks()}});
    const ci=L.circle([pt.lat,pt.lng],{radius:pt.radius||30,color:'#e8572a',fillColor:'rgba(232,87,42,.15)',fillOpacity:.15,weight:1,dashArray:'5,5'}).addTo(eMap);
    eMks.push(mk,ci);
  });
  document.getElementById('ptCt').textContent=pts.length;
  document.getElementById('ptPl').textContent=pts.length!==1?'s':'';
  renderCh();
}

function renderCh(){
  const s=document.getElementById('chipS');
  if(editId){s.style.display='none';return}
  s.style.display=pts.length>0?'flex':'none';
  s.innerHTML=pts.sort((a,b)=>a.order-b.order).map(p=>`<button class="chip" onclick="openP('${p.id}');eMap.panTo([${p.lat},${p.lng}])"><span class="n">${p.order}</span><span>${p.title}</span>${p.audioUrl?'<span class="au">♪</span>':''}</button>`).join('');
}

function toggleClick(){
  clickOn=!clickOn;
  document.getElementById('addBtn').className='add-btn '+(clickOn?'on':'idle');
  document.getElementById('addTxt').textContent=clickOn?'Tocá el mapa':'Agregar punto';
  eMap.getContainer().style.cursor=clickOn?'crosshair':'';
}

function openP(id){
  editId=id;const p=pts.find(x=>x.id===id);if(!p)return;
  document.getElementById('fT').value=p.title;
  document.getElementById('fA').value=p.audioUrl;
  document.getElementById('fR').value=p.radius;
  document.getElementById('fRV').textContent=p.radius+'m';
  document.getElementById('fO').value=p.order;
  document.getElementById('fM').value=p.message;
  document.getElementById('fN').value=p.notification;
  document.getElementById('fC').textContent='📍 '+p.lat.toFixed(6)+', '+p.lng.toFixed(6);
  document.getElementById('seqTg').className='tg '+(p.triggerSequence?'on':'off');
  rTP(p.triggerTime);
  document.getElementById('panel').style.display='flex';renderCh();
}
function closeP(){editId=null;document.getElementById('panel').style.display='none';renderCh()}
function upd(f,v){const p=pts.find(x=>x.id===editId);if(!p)return;p[f]=v;sv();if(f==='radius'||f==='order')renderMks()}
function delPt(){pts=pts.filter(p=>p.id!==editId);sv();closeP();renderMks()}
function tgSeq(){const p=pts.find(x=>x.id===editId);if(!p)return;p.triggerSequence=!p.triggerSequence;sv();document.getElementById('seqTg').className='tg '+(p.triggerSequence?'on':'off')}
function rTP(a){const o=[['any','Siempre'],['morning','Mañana'],['afternoon','Tarde'],['evening','Atardecer'],['night','Noche']];document.getElementById('tPills').innerHTML=o.map(([v,l])=>`<button class="pill ${a===v?'on':''}" onclick="sTime('${v}')">${l}</button>`).join('')}
function sTime(v){upd('triggerTime',v);rTP(v)}

// ═══ PLAYER ═══
function initP(){
  ld();
  if(pMap){pMap.remove();pMap=null;uMkP=null}
  const c=pts.length>0?[pts[0].lat,pts[0].lng]:(userLat?[userLat,userLng]:[-34.9011,-56.1645]);
  pMap=L.map('pMap',{zoomControl:false}).setView(c,16);
  pTileLayer=L.tileLayer(TILES[curStyleP],{maxZoom:19}).addTo(pMap);
  updateStyleMenu('styleMenuP',curStyleP);

  // Close style menu on map click
  pMap.on('click',()=>{document.getElementById('styleMenuP').classList.remove('show')});

  const so=[...pts].sort((a,b)=>a.order-b.order);
  so.forEach(p=>{
    L.circle([p.lat,p.lng],{radius:p.radius||30,color:'#c77dff',fillColor:'rgba(199,125,255,.15)',fillOpacity:.2,weight:1.5}).addTo(pMap);
    const ic=L.divIcon({className:'',html:`<div style="width:26px;height:26px;border-radius:50%;background:rgba(199,125,255,.13);border:2px solid #c77dff;display:flex;align-items:center;justify-content:center;color:#c77dff;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif">${p.order}</div>`,iconSize:[26,26],iconAnchor:[13,13]});
    L.marker([p.lat,p.lng],{icon:ic}).addTo(pMap);
  });
  if(so.length>1)L.polyline(so.map(p=>[p.lat,p.lng]),{color:'rgba(199,125,255,.25)',weight:2,dashArray:'8,8'}).addTo(pMap);

  done=new Set();notified=new Set();
  updPrg();updMBtn();
}

function updPrg(){
  const t=pts.length,d=done.size,p=t>0?Math.round(d/t*100):0;
  document.getElementById('prL').textContent=`${d} / ${t} puntos`;
  document.getElementById('prP').textContent=p+'%';
  document.getElementById('prF').style.width=p+'%';
}

function updMBtn(){
  const b=document.getElementById('mBtn');
  if(pts.length===0){b.className='mbtn dis';b.innerHTML='▶ Sin puntos cargados';b.disabled=true}
  else if(tracking){b.className='mbtn st';b.innerHTML='⏹ Detener experiencia';b.disabled=false}
  else{b.className='mbtn go';b.innerHTML='▶ Iniciar experiencia';b.disabled=false}
}

function tgTrack(){if(pts.length===0)return;tracking?stopTr():startTr()}

function startTr(){
  if(!navigator.geolocation){alert('GPS no disponible');return}
  tracking=true;updMBtn();
  watchId=navigator.geolocation.watchPosition(pos=>{
    userLat=pos.coords.latitude;userLng=pos.coords.longitude;
    if(pMap){
      if(uMkP)uMkP.setLatLng([userLat,userLng]);
      else uMkP=L.marker([userLat,userLng],{icon:makeUserIcon(),zIndexOffset:1000}).addTo(pMap);
      pMap.panTo([userLat,userLng]);
    }
    chkProx(userLat,userLng);
  },e=>{console.warn('GPS:',e.message)},{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
}

function stopTr(){
  if(watchId!==null)navigator.geolocation.clearWatch(watchId);
  watchId=null;tracking=false;stopAud();
  document.getElementById('npCard').style.display='none';updMBtn();
}

function chkProx(lat,lng){
  const t=tod(),so=[...pts].sort((a,b)=>a.order-b.order);
  for(const p of so){
    if(done.has(p.id))continue;
    const d=hav(lat,lng,p.lat,p.lng),r=p.radius||30;
    if(p.triggerTime&&p.triggerTime!=='any'&&p.triggerTime!==t)continue;
    if(p.triggerSequence){const prev=so.find(x=>x.order===p.order-1);if(prev&&!done.has(prev.id))continue}
    if(d<=r*1.5&&!notified.has(p.id)&&d>r){notified.add(p.id);if(p.notification)showN(p.notification)}
    if(d<=r){
      done.add(p.id);activePt=p.id;
      if(p.audioUrl){const a=document.getElementById('aud');a.src=p.audioUrl;a.play().then(()=>{playing=true;document.getElementById('npN').textContent=p.title;document.getElementById('npCard').style.display='block'}).catch(()=>{})}
      if(p.message)showN(p.message);
      updPrg();break;
    }
  }
}

function showN(t){clearTimeout(nTimer);document.getElementById('nTxt').textContent=t;document.getElementById('nToast').style.display='block';nTimer=setTimeout(()=>{document.getElementById('nToast').style.display='none'},5000)}
function stopAud(){const a=document.getElementById('aud');a.pause();a.currentTime=0;playing=false;document.getElementById('npCard').style.display='none'}
document.getElementById('aud').addEventListener('ended',()=>{playing=false;document.getElementById('npCard').style.display='none'});

// ═══ SWITCH ═══
function toPlayer(){document.getElementById('eView').style.display='none';document.getElementById('pView').style.display='flex';setTimeout(()=>initP(),50)}
function toEditor(){stopTr();document.getElementById('pView').style.display='none';document.getElementById('eView').style.display='flex';setTimeout(()=>{if(eMap)eMap.invalidateSize()},100)}

// ═══ INIT ═══
ld();
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    p=>{userLat=p.coords.latitude;userLng=p.coords.longitude;initE([userLat,userLng])},
    ()=>initE([-34.9011,-56.1645])
  );
}else initE([-34.9011,-56.1645]);
</script>
